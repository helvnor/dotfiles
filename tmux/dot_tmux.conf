## BINDINGS
# General
set-option -g focus-events on

# Vi-mode
set -g mode-keys vi

# Prefix changed to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Selecting windows 1-12 using F1-F12
bind-key -T root F1 select-window -t 1
bind-key -T root F2 select-window -t 2
bind-key -T root F3 select-window -t 3
bind-key -T root F4 select-window -t 4
bind-key -T root F5 select-window -t 5
bind-key -T root F6 select-window -t 6
bind-key -T root F7 select-window -t 7
bind-key -T root F8 select-window -t 8
bind-key -T root F9 select-window -t 9
bind-key -T root F10 select-window -t 10
bind-key -T root F11 select-window -t 11
bind-key -T root F12 select-window -t 12

# Splits
bind-key -T prefix 's' split-window -v 
bind-key -T prefix 'v' split-window -h 

# Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resizing (hold prefix + arrow keys)
bind -r left resize-pane -L 3
bind -r down resize-pane -D 3
bind -r up resize-pane -U 3
bind -r right resize-pane -R 3

# Rebind copy mode
unbind q
bind q copy-mode

## Sync mode
bind y setw synchronize-panes
set -g pane-active-border-style "#{?pane_synchronized,fg=#e67e80 bold,fg=#a7c080}"

## Enable mouse
set -g mouse off

# Default shell
set -g default-shell /run/current-system/sw/bin/fish

# Scroll history limit
set -g history-limit 100000

## Styling
# Status bar moved to top
set -g default-terminal "tmux-256color"

# Window panes
set -g pane-border-style 'fg=#374145'

set -g status-position top
set -g status-style ''
set -g status-left ''
set -g status-left-length 50

# Date / time
set -g status-right-style 'bg=default fg=#d3c6aa'
set -g status-right '#(whoami)#[fg=#a7c080]@#{host}#[fg=#d3c6aa] %Y-%m-%d %H:%M '
set -g status-right-length 50

# Minimal design
set -g status-justify centre
set -g window-status-current-format '#[fg=#a7c080] F#I #W '
set -g window-status-format '#[fg=#d3c6aa] F#I #W '

# Command prompt
set -g message-style "fg=#d3c6aa bg=default"
set -g mode-style "fg=#d3c6aa bg=default"

## First tab -> #1
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on   
set -g renumber-windows on   
